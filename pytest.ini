[pytest]
# ── Test discovery ──────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Markers ─────────────────────────────────────────────────────────
# Run unit tests only (no API calls):
#   pytest -m "not integration"
#
# Run integration tests only (needs GOOGLE_API_KEY):
#   pytest -m integration
#
# Run everything:
#   pytest
markers =
    integration: marks tests that make real API calls (requires GOOGLE_API_KEY)
    slow: marks tests that take more than 10 seconds

# ── Output ──────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=60

# ── Logging ─────────────────────────────────────────────────────────
log_cli = true
log_cli_level = WARNING
