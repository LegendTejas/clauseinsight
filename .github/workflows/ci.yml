# ──────────────────────────────────────────────────────────────────
# ClauseInsight — Continuous Integration
# ──────────────────────────────────────────────────────────────────
#
# Triggers: every push to main, every pull request targeting main.
#
# Jobs
# ────
#   lint         — ruff (linter) + black (format check)
#   typecheck    — pyright static type checking  (via npx)
#   test         — pytest unit tests only (-m "not integration")
#                  coverage threshold: 40 %  (workflow override)
# ──────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint + format ──────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"   # latest stable; 3.14 pre-release not yet on runners

      - name: Install dev dependencies
        run: pip install ruff black

      - name: ruff — lint
        continue-on-error: true
        run: ruff check src/ tests/

      - name: black — format check
        continue-on-error: true
        run: black --check src/ tests/

  # ── 2. Type check ─────────────────────────────────────────────────
  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run pyright
        continue-on-error: true
        run: npx --yes pyright src/

  # ── 3. Unit tests ─────────────────────────────────────────────────
  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no API calls)
        run: |
          pytest -m "not integration" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=40

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7
