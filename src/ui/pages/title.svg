<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 900 170"
    width="900"
    height="170">

    <defs>

        <linearGradient id="combo-sweep"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="0%">

            <stop offset="0%" stop-color="#0debebff"/>
            <stop offset="20%" stop-color="#0b69c7ff"/>
            <stop offset="40%" stop-color="#FFFFFF"/>
            <stop offset="60%" stop-color="#9C27B0"/>
            <stop offset="80%" stop-color="#b607ebff"/>
            <stop offset="100%" stop-color="#50ee29ff"/>

            <animateTransform
                attributeName="gradientTransform"
                type="translate"
                values="-1 0;1 0;-1 0"
                dur="10s"
                repeatCount="indefinite"/>

        </linearGradient>

    </defs>

    <text
        x="450"
        y="92"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="50"
        font-weight="700"
        letter-spacing="-1"
        fill="url(#combo-sweep)">
        ⚖️ ClauseInsight
    </text>

</svg>